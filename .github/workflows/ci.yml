name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint & CodeSniffer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs, composer

      - name: PHP 문법 검사
        run: find . -name '*.php' -not -path './.git/*' | xargs -P4 php -l | grep -v "No syntax errors" || true

      - name: Install PHPCS WordPress Standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev \
            wp-coding-standards/wpcs:^3 \
            phpcsstandards/phpcsutils:^1 \
            phpcsstandards/phpcsextra:^1 \
            --no-interaction --quiet

      - name: PHPCS — WordPress 코딩 스탠다드
        run: phpcs --report=summary

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start wp-env (WordPress + WooCommerce)
        run: npx wp-env start
        timeout-minutes: 5

      - name: Activate plugins & 초기 설정
        run: |
          npx wp-env run cli wp plugin activate woocommerce --quiet
          npx wp-env run cli wp plugin activate wc-order-webhook --quiet
          npx wp-env run cli wp option update blogname "E2E Test Site" --quiet

      - name: Run E2E tests
        run: npx playwright test
        env:
          WP_URL: http://localhost:8888
          WP_ADMIN: admin
          WP_PASS: password

      - name: Upload Playwright report (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
