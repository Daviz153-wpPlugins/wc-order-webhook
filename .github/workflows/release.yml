name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: 버전 업데이트 및 릴리즈 ZIP 빌드
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 태그에서 버전 추출
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: wc-order-webhook.php 버전 업데이트
        run: |
          sed -i "s/^ \* Version:.*/ * Version:     ${{ steps.version.outputs.version }}/" wc-order-webhook.php

      - name: 버전 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wc-order-webhook.php
          git diff --staged --quiet || git commit -m "chore: 버전 ${{ steps.version.outputs.version }} 업데이트"
          git push

      - name: 릴리즈 ZIP 빌드
        run: |
          mkdir -p /tmp/build/wc-order-webhook
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='.gitignore' \
            --exclude='.phpcs.xml' \
            --exclude='.wp-env.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='playwright.config.js' \
            --exclude='vendor' \
            --exclude='node_modules' \
            . /tmp/build/wc-order-webhook/
          cd /tmp/build
          zip -r $GITHUB_WORKSPACE/wc-order-webhook-${{ github.ref_name }}.zip wc-order-webhook/

      - name: 릴리즈에 ZIP 업로드
        run: gh release upload ${{ github.ref_name }} wc-order-webhook-${{ github.ref_name }}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
